<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Empire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>MONEY EMPIRE</h1>
        
        <div id="balance-container">
            <span id="balance-display">$0</span>
        </div>
        
        <div id="stats-container">
            <span id="income-display">0/sec</span> | <span id="click-power-display">1/Klick</span>
        </div>

        <button id="click-btn">$</button>

        <div id="shop-section">
            <h2>Upgrades & Investments</h2>
            <div id="upgrades-container">
                </div>
            
            <button id="prestige-btn">Empire verkaufen (Prestige)</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
